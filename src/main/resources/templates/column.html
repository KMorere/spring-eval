<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Column</title>
    <link rel="stylesheet" href="../static/css/bootstrap.min.css"
          th:href="@{css/bootstrap.min.css}">
</head>

<body>
    <div th:fragment="column(title, cond)">
        <div class="col-sm-4">
            <div class="panel panel-default">
                <div class="panel-heading" style="display: flex; align-items: center; justify-content: space-between;">
                    <div th:text="${title}"></div>
                </div>

                <div class="panel-body">
                    <div class="panel panel-default" th:each="task:${tasks}" th:if="${task.isCompleted()==cond}">
                        <div class="panel-heading" style="display: flex; align-items: center; justify-content: space-between;">
                            <div th:text="${task.tag.getTitle()}"></div>
                            <div th:if="${session.currentUser != null}">
                                <a class="btn btn-primary" style="padding: 3px; padding-inline: 6px;" th:href="@{/edit_task(id=${task.id})}">
                                    <i class="bi bi-pencil-square"></i>
                                </a>
                                <a class="btn btn-danger" style="padding: 3px; padding-inline: 6px;"
                                   th:href="@{/delete_task(id=${task.id})}">
                                    <i class="bi bi-trash3"></i>
                                </a>
                            </div>
                        </div>

                        <div class="panel-body">
                            <div style="display: flex; align-items: center; justify-content: space-between;">
                                <h5 class="panel-title" th:text="${task.title}"></h5>
                                <form th:if="${session.currentUser != null}"
                                      th:action="@{/complete_task}" method="post">
                                    <input type="hidden" class="form-control" name="id" th:value="*{task.id}">

                                    <label class="control-label">
                                        <span>Done :</span>
                                        <input type="radio" name="completed"
                                               th:checked="${task.isCompleted()}" onclick="this.form.submit()">
                                    </label>
                                </form>
                            </div>
                            <p class="panel-text" th:text="${task.description}"></p>
                        </div>

                        <div class="panel-footer text-muted">
                            <div th:if="${task.dateCountdown() >= 0}">
                                <i class="bi bi-clock"></i>
                                <span th:text="${task.formatDate()}"></span>
                            </div>
                            <div class="text-danger" th:unless="${task.dateCountdown() >= 0}">
                                <i class="bi bi-clock"></i>
                                <span th:text="${task.formatDate()}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
