<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <title>Login</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="panel panel-default">
                    <div class="panel-heading bg-dark text-white text-center">
                        <div>Login</div>
                    </div>

                    <div class="panel-body">
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <form th:action="@{/login}" method="post">
                            <div>
                                <label class="form-label">Username</label>
                                <input type="text" name="username" class="form-control" required>
                            </div>
                            <div>
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <div class="container d-flex justify-content-space-between">
                                <button type="submit" class="btn btn-success w-50 me-3">Login</button>
                                <a th:href="@{/index}" class="btn btn-danger w-50">Cancel</a>
                            </div>

                        </form>

                        <hr>
                        <p class="text-center mb-0">
                            No account ?
                            <a th:href="@{/register}">Register</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
