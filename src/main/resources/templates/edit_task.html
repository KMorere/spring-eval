<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="ISO-8859-1">
    <title>Edit Task</title>
</head>

<body>
<div layout:fragment="content">
    <div class="col-md-4 col-xs-8">
        <div class="panel panel-primary">
            <div class="panel-heading">Edit</div>

            <div class="panel-body">
                <form th:action="@{/update}" th:object="${task}" method="post">
                    <input type="hidden" class="form-control" name="id" th:value="*{id}" id="id">

                    <div class="form-group">
                        <label class="control-label">
                            Title :
                            <input class="form-control" type="text" th:field="*{title}">
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="control-label">
                            Description :
                            <input class="form-control" type="text" th:field="*{description}">
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="control-label">
                            <input type="date" th:field="*{date}">
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="control-label">
                            Tag :
                            <select th:field="*{tag}">
                                <option th:each="c:${tags}" th:value="${c.id}" th:text="${c.title}"></option>
                            </select>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary">Save</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
