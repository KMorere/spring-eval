<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="ISO-8859-1">
    <title>Boardle</title>
    <link rel="stylesheet" href="../static/css/bootstrap.min.css"
          th:href="@{css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
<div layout:fragment="content">
    <div class="container">
        <div class="container-fluid">
            <ul class="nav nav-pills">

            </ul>
        </div>

        <div class="panel panel-primary">
            <div class="panel-heading">Board</div>

            <div class="panel-body">
                <div class="panel-body">
                    <form th:action="@{/index}" method="get">
                        <label>
                            Keyword
                            <input type="text" name="keyword" th:value="${keyword}">
                        </label>
                        <button type="submit" class="btn btn-primary">Search</button>
                    </form>
                </div>

                <div class="container-fluid">
                    <ul class="nav nav-pills">
                        <li th:class="${tag==t.title}?'active':''" th:each="t:${tags}">
                            <a th:href="@{/index(page=${currentPage}, keyword=${keyword}, tag=${t.title})}" th:text="${t.title}"></a>
                        </li>
                    </ul>
                </div>

                <div th:replace="column :: column('To-Do', false)"></div>

                <div th:replace="column :: column('Done', true)"></div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
