<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="ISO-8859-1">
    <title>Boardle</title>
    <link rel="stylesheet" href="../static/css/bootstrap.min.css"
          th:href="@{css/bootstrap.min.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
<div layout:fragment="content">
    <div class="container">
        <div class="container-fluid">
            <ul class="nav nav-pills">

            </ul>
        </div>

        <div class="panel panel-primary">
            <div class="panel-heading">Board</div>

            <div class="panel-body">
                <table class="table table-bordered">
                    <tr>
                        <th>Id</th>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Date</th>
                    </tr>
                    <tr th:each="a:${tasks}">
                        <td th:text="${a.id}"></td>
                        <td th:text="${a.title}"></td>
                        <td th:text="${a.description}"></td>
                        <td th:text="${a.date}"></td>
                    </tr>
                </table>
            </div>
        </div>

        <div class="col-sm-4">
            <div class="panel panel-default">
                <div class="panel-heading" style="display: flex; align-items: center; justify-content: space-between;">
                    <div>To-Do</div>
                    <a th:href="@{/add_task}"
                       class="btn btn-primary" style="padding: 3px; padding-inline: 6px;"><i class="bi bi-plus-square" style="margin: 0px;"></i></a>
                </div>

                <div class="panel-body">
                    <div th:each="task:${tasks}">
                        <div class="panel panel-default">
                            <div class="panel-heading" th:text="${task.tag.getTitle()}"></div>

                            <div class="panel-body">
                                <h5 class="panel-title" th:text="${task.title}"></h5>
                                <p class="panel-text" th:text="${task.description}">.</p>
                            </div>

                            <div class="panel-footer text-muted">
                                <i class="bi bi-clock"></i>
                                <span th:text="${task.date}"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
